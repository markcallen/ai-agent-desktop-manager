---
- name: Provision ai-agent-desktop-manager smoke test host
  hosts: all
  become: true
  vars:
    aadm_service_user: aadm
    aadm_service_group: aadm
    aadm_install_dir: /opt/ai-agent-desktop-manager
    aab_install_dir: /opt/ai-agent-browser
    aadm_state_dir: /opt/ai-agent-desktop-manager/data
    aadm_nginx_snippet_dir: /etc/nginx/conf.d/agent-desktops
    aadm_repo_archive_remote: /tmp/ai-agent-desktop-manager.tgz
    aadm_repo_archive_local: ''
    aab_repo_archive_remote: /tmp/ai-agent-browser.tgz
    aab_repo_archive_local: ''
    aadm_public_base_url: ''
    aadm_auth_token: ''
    aadm_npm_global_bin: /usr/local/bin
    aadm_npm_package: ai-agent-browser
    aadm_smoke_create_desktop: true
    aadm_smoke_destroy_desktop: false
  tasks:
    - name: Wait for cloud-init to finish if present
      ansible.builtin.command:
        cmd: cloud-init status --wait
      register: aadm_cloud_init_wait
      changed_when: false
      failed_when: false

    - name: Wait for apt and dpkg locks to clear
      ansible.builtin.shell: |
        set -euo pipefail
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
          || fuser /var/lib/dpkg/lock >/dev/null 2>&1 \
          || fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
          sleep 5
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure apt prerequisites are present
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - git
          - gnupg
          - jq
          - nginx
          - novnc
          - openbox
          - python3
          - python3-apt
          - python3-websockify
          - rsync
          - tigervnc-standalone-server
          - tigervnc-tools
          - wmctrl
          - xauth
          - xfonts-base
          - xterm
        update_cache: true

    - name: Install NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /tmp/nodesource.gpg.key
        mode: '0644'

    - name: Dearmor NodeSource GPG key
      ansible.builtin.command:
        cmd: gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Configure NodeSource repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/nodesource.list
        mode: '0644'
        content: |
          deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        update_cache: true

    - name: Install npm
      ansible.builtin.apt:
        name: npm
        update_cache: true

    - name: Detect node binary path
      ansible.builtin.shell: |
        set -euo pipefail
        command -v node
      args:
        executable: /bin/bash
      register: aadm_node_path
      changed_when: false

    - name: Detect npm binary path
      ansible.builtin.shell: |
        set -euo pipefail
        command -v npm
      args:
        executable: /bin/bash
      register: aadm_npm_path
      changed_when: false

    - name: Record node and npm binary paths
      ansible.builtin.set_fact:
        aadm_node_bin: '{{ aadm_node_path.stdout }}'
        aadm_npm_bin: '{{ aadm_npm_path.stdout }}'

    - name: Install Google Chrome signing key
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/linux_signing_key.pub
        dest: /tmp/google-linux-signing-key.pub
        mode: '0644'

    - name: Dearmor Google Chrome signing key
      ansible.builtin.command:
        cmd: gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg /tmp/google-linux-signing-key.pub
      args:
        creates: /usr/share/keyrings/google-chrome.gpg

    - name: Configure Google Chrome repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/google-chrome.list
        mode: '0644'
        content: |
          deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main

    - name: Install Google Chrome
      ansible.builtin.apt:
        name: google-chrome-stable
        update_cache: true

    - name: Ensure service group exists
      ansible.builtin.group:
        name: '{{ aadm_service_group }}'
        system: true

    - name: Ensure service user exists
      ansible.builtin.user:
        name: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        create_home: true
        home: /var/lib/aadm
        shell: /usr/sbin/nologin
        system: true

    - name: Ensure VNC directory exists
      ansible.builtin.file:
        path: /var/lib/aadm/.vnc
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0700'

    - name: Install VNC xstartup
      ansible.builtin.copy:
        dest: /var/lib/aadm/.vnc/xstartup
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'
        content: |
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec openbox-session

    - name: Ensure vncserver compatibility symlink exists when needed
      ansible.builtin.file:
        src: /usr/bin/tigervncserver
        dest: /usr/bin/vncserver
        state: link
      when: ansible_facts.os_family == "Debian"

    - name: Ensure install directory exists
      ansible.builtin.file:
        path: '{{ aadm_install_dir }}'
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'

    - name: Ensure ai-agent-browser install directory exists
      ansible.builtin.file:
        path: '{{ aab_install_dir }}'
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'

    - name: Upload repository archive
      ansible.builtin.copy:
        src: '{{ aadm_repo_archive_local }}'
        dest: '{{ aadm_repo_archive_remote }}'
        mode: '0644'

    - name: Upload ai-agent-browser archive
      ansible.builtin.copy:
        src: '{{ aab_repo_archive_local }}'
        dest: '{{ aab_repo_archive_remote }}'
        mode: '0644'

    - name: Unpack repository archive
      ansible.builtin.unarchive:
        src: '{{ aadm_repo_archive_remote }}'
        dest: '{{ aadm_install_dir }}'
        remote_src: true
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        extra_opts:
          - --strip-components=1

    - name: Unpack ai-agent-browser archive
      ansible.builtin.unarchive:
        src: '{{ aab_repo_archive_remote }}'
        dest: '{{ aab_install_dir }}'
        remote_src: true
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        extra_opts:
          - --strip-components=1

    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} install'
        chdir: '{{ aadm_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Install ai-agent-browser npm dependencies
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} install'
        chdir: '{{ aab_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Build manager
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} run build'
        chdir: '{{ aadm_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Build ai-agent-browser
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} run build'
        chdir: '{{ aab_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Install global aadm CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/aadm
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-desktop-manager/dist/cli/aadm.js "$@"

    - name: Install global aab-console CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/aab-console
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-desktop-manager/dist/cli/aab-console.js "$@"

    - name: Install global ai-agent-browser CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/ai-agent-browser
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-browser/dist/index.js "$@"

    - name: Install global aab CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/aab
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-browser/dist/index.js "$@"

    - name: Ensure nginx snippet directory exists
      ansible.builtin.file:
        path: '{{ aadm_nginx_snippet_dir }}'
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'

    - name: Ensure default nginx site includes desktop snippets
      ansible.builtin.blockinfile:
        path: /etc/nginx/sites-available/default
        marker: '# {mark} AADM DESKTOP ROUTES'
        insertafter: 'server_name _;'
        block: |
          include /etc/nginx/conf.d/agent-desktops/*.conf;

    - name: Render manager environment
      ansible.builtin.copy:
        dest: '{{ aadm_install_dir }}/.env'
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0640'
        content: |
          AADM_HOST=127.0.0.1
          AADM_PORT=8899
          AADM_AUTH_TOKEN={{ aadm_auth_token }}
          AADM_PUBLIC_BASE_URL={{ aadm_public_base_url }}
          AADM_NGINX_SNIPPET_DIR={{ aadm_nginx_snippet_dir }}
          AADM_STATE_DIR={{ aadm_state_dir }}
          AADM_DISPLAY_MIN=1
          AADM_DISPLAY_MAX=10
          AADM_WEBSOCKIFY_PORT_MIN=6081
          AADM_WEBSOCKIFY_PORT_MAX=6090
          AADM_CDP_PORT_MIN=9222
          AADM_CDP_PORT_MAX=9231
          AADM_AAB_PORT_MIN=8765
          AADM_AAB_PORT_MAX=8774
          AADM_NGINX_BIN=/usr/sbin/nginx
          AADM_SYSTEMCTL_BIN=/bin/systemctl
          AADM_UNIT_VNC=vnc@
          AADM_UNIT_WEBSOCKIFY=websockify@
          AADM_UNIT_CHROME=chrome@
          AADM_UNIT_AAB=aab@
          AADM_NOVNC_PATH_PREFIX=/desktop

    - name: Install sudoers allowlist
      ansible.builtin.copy:
        src: '{{ aadm_install_dir }}/ops/sudoers-aadm'
        dest: /etc/sudoers.d/aadm
        remote_src: true
        owner: root
        group: root
        mode: '0440'

    - name: Install systemd units
      ansible.builtin.copy:
        src: '{{ item }}'
        dest: '/etc/systemd/system/{{ item | basename }}'
        remote_src: true
        owner: root
        group: root
        mode: '0644'
      loop:
        - '{{ aadm_install_dir }}/systemd/aadm.service'
        - '{{ aadm_install_dir }}/systemd/vnc@.service'
        - '{{ aadm_install_dir }}/systemd/websockify@.service'
        - '{{ aadm_install_dir }}/systemd/chrome@.service'
        - '{{ aadm_install_dir }}/systemd/aab@.service'

    - name: Ensure nginx is enabled and started
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reset failed state for smoke-test units
      ansible.builtin.command:
        cmd: systemctl reset-failed aadm.service vnc@1 websockify@1 chrome@1 aab@1
      changed_when: false
      failed_when: false

    - name: Enable and start manager
      ansible.builtin.systemd:
        name: aadm.service
        enabled: true
        state: started

    - name: Wait for manager health endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:8899/health
        return_content: true
        status_code: 200
      register: aadm_health
      retries: 20
      delay: 3
      until: aadm_health.status == 200

    - name: Create smoke desktop
      ansible.builtin.uri:
        url: http://127.0.0.1:8899/v1/desktops
        method: POST
        body_format: json
        body:
          owner: smoke-test
          label: ubuntu-24-spot
          ttlMinutes: 120
          startUrl: https://example.com
        return_content: true
        status_code: 200
      register: aadm_create
      when: aadm_smoke_create_desktop

    - name: Run doctor on smoke desktop
      ansible.builtin.uri:
        url: "http://127.0.0.1:8899/v1/desktops/{{ (aadm_create.json.id | default('desk-1')) }}/doctor"
        return_content: true
        status_code: 200
      register: aadm_doctor
      when: aadm_smoke_create_desktop

    - name: Verify public noVNC route is reachable through nginx
      ansible.builtin.uri:
        url: 'http://127.0.0.1/desktop/{{ aadm_create.json.display }}/'
        return_content: true
        status_code: 200
      register: aadm_novnc
      when: aadm_smoke_create_desktop

    - name: Destroy smoke desktop when requested
      ansible.builtin.uri:
        url: 'http://127.0.0.1:8899/v1/desktops/{{ aadm_create.json.id }}'
        method: DELETE
        return_content: true
        status_code: 200
      when:
        - aadm_smoke_create_desktop
        - aadm_smoke_destroy_desktop

    - name: Write smoke summary
      ansible.builtin.copy:
        dest: /tmp/aadm-smoke-summary.json
        mode: '0644'
        content: |
          {
            "health": {{ aadm_health.json | to_nice_json }},
            "create": {{ aadm_create.json | default({}) | to_nice_json }},
            "doctor": {{ aadm_doctor.json | default({}) | to_nice_json }},
            "novnc_status": {{ aadm_novnc.status | default(0) }},
            "vnc_auth": "disabled_for_smoke_test"
          }

    - name: Show aadm CLI usage
      ansible.builtin.debug:
        msg:
          - 'Use the global aadm CLI on the host:'
          - '  aadm create --owner smoke --label first --ttl 60 --start-url https://example.com'
          - '  aadm list'
          - '  aadm doctor --id desk-1'
          - '  aadm destroy --id desk-1'
          - 'Follow browser console events:'
          - '  aab-console follow'
          - 'Run JS and keep following:'
          - "  aab-console eval 'console.log(window.location.href)' --follow"
          - 'Capture a screenshot:'
          - '  aab-console screenshot --out shot.png'
          - 'ai-agent-browser is also available globally:'
          - '  ai-agent-browser --host 127.0.0.1 --port 8765 --cdp-host 127.0.0.1 --cdp-port 9222'
          - '  aab --host 127.0.0.1 --port 8765 --cdp-host 127.0.0.1 --cdp-port 9222'
