---
- name: Provision ai-agent-desktop-manager smoke test host
  hosts: all
  become: true
  vars:
    aadm_service_user: aadm
    aadm_service_group: aadm
    aadm_install_dir: /opt/ai-agent-desktop-manager
    aab_install_dir: /opt/ai-agent-browser
    aadm_state_dir: /opt/ai-agent-desktop-manager/data
    aadm_nginx_snippet_dir: /etc/nginx/conf.d/agent-desktops
    aadm_repo_archive_remote: /tmp/ai-agent-desktop-manager.tgz
    aadm_repo_archive_local: ''
    aab_repo_archive_remote: /tmp/ai-agent-browser.tgz
    aab_repo_archive_local: ''
    aadm_public_base_url: ''
    aadm_auth_token: ''
    aadm_npm_global_bin: /usr/local/bin
    aadm_npm_package: ai-agent-browser
    aadm_enable_https: true
    aadm_tls_domain: ''
    aadm_tls_email: ''
    aadm_tls_staging: false
    aadm_vnc_password: SmokePassw0rd!
    aadm_desktop_route_token_secret: '{{ lookup("ansible.builtin.password", "/dev/null length=64 chars=ascii_letters,digits") }}'
    aadm_tls_cert_path: '/etc/letsencrypt/live/{{ aadm_tls_domain }}/fullchain.pem'
    aadm_tls_key_path: '/etc/letsencrypt/live/{{ aadm_tls_domain }}/privkey.pem'
    aadm_smoke_create_desktop: true
    aadm_smoke_destroy_desktop: false
    # ai-agent-bridge address for AADM_BRIDGE_ADDR.
    # Empty = bridge disabled (AADM runs without agent sessions).
    # Set to the gRPC address of a running ai-agent-bridge instance, e.g. 127.0.0.1:9445,
    # when the bridge is deployed alongside AADM on this host.
    aadm_bridge_addr: ''
    # API keys forwarded to the bridge process environment (only used when bridge is deployed).
    aadm_anthropic_api_key: ''
    aadm_openai_api_key: ''
    aadm_gemini_api_key: ''
    # Set to true to install and run ai-agent-bridge on this host via Docker.
    # When true, aadm_bridge_addr is automatically set to 127.0.0.1:9445 and
    # the bridge cert paths are configured in the AADM environment file.
    aadm_install_bridge: false
    aadm_bridge_image: ghcr.io/markcallen/ai-agent-bridge:v0.2.0
    aadm_bridge_install_dir: /opt/ai-agent-bridge
    aadm_bridge_cert_dir: /opt/ai-agent-bridge/certs
  tasks:
    - name: Wait for cloud-init to finish if present
      ansible.builtin.command:
        cmd: cloud-init status --wait
      register: aadm_cloud_init_wait
      changed_when: false
      failed_when: false

    - name: Wait for apt and dpkg locks to clear
      ansible.builtin.shell: |
        set -euo pipefail
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
          || fuser /var/lib/dpkg/lock >/dev/null 2>&1 \
          || fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
          sleep 5
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install Node.js 22 with geerlingguy.nodejs
      ansible.builtin.include_role:
        name: geerlingguy.nodejs
      vars:
        nodejs_version: '22.x'

    - name: Ensure apt prerequisites are present
      ansible.builtin.apt:
        name:
          - git
          - gnupg
          - jq
          - python3
          - python3-apt
          - rsync
          - tmux
          - wmctrl
          - xauth
          - xfonts-base
        update_cache: true

    - name: Install novnc-openbox base stack from v0.1.0
      ansible.builtin.include_role:
        name: novnc
      vars:
        vnc_user: ubuntu
        vnc_display: 1
        vnc_password: '{{ aadm_vnc_password }}'
        smoke_test_marker_enabled: true
        use_certbot: '{{ aadm_enable_https | bool }}'
        tls_domain: >-
          {{
            aadm_tls_domain
            if (aadm_enable_https | bool and aadm_tls_domain | length > 0)
            else inventory_hostname
          }}
        letsencrypt_email: '{{ aadm_tls_email }}'

    - name: Replace noVNC root landing page with aadm smoke page
      ansible.builtin.template:
        src: '{{ playbook_dir }}/../templates/aadm-smoke-landing.html.j2'
        dest: /usr/share/novnc/index.html
        owner: root
        group: root
        mode: '0644'

    - name: Detect node binary path
      ansible.builtin.shell: |
        set -euo pipefail
        command -v node
      args:
        executable: /bin/bash
      register: aadm_node_path
      changed_when: false

    - name: Detect npm binary path
      ansible.builtin.shell: |
        set -euo pipefail
        command -v npm
      args:
        executable: /bin/bash
      register: aadm_npm_path
      changed_when: false

    - name: Record node and npm binary paths
      ansible.builtin.set_fact:
        aadm_node_bin: '{{ aadm_node_path.stdout }}'
        aadm_npm_bin: '{{ aadm_npm_path.stdout }}'

    - name: Verify Node 22 is installed
      ansible.builtin.command:
        cmd: '{{ aadm_node_bin }} --version'
      register: aadm_node_version
      changed_when: false
      failed_when: not (aadm_node_version.stdout is match("^v22\\."))

    - name: Ensure service group exists
      ansible.builtin.group:
        name: '{{ aadm_service_group }}'
        system: true

    - name: Ensure service user exists
      ansible.builtin.user:
        name: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        create_home: true
        home: /var/lib/aadm
        shell: /usr/sbin/nologin
        system: true

    - name: Ensure VNC directory exists
      ansible.builtin.file:
        path: /var/lib/aadm/.vnc
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0700'

    - name: Install VNC xstartup
      ansible.builtin.copy:
        dest: /var/lib/aadm/.vnc/xstartup
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'
        content: |
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec openbox-session

    - name: Ensure manager Openbox config directory exists
      ansible.builtin.file:
        path: /var/lib/aadm/.config/openbox
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'

    - name: Ensure vncserver compatibility symlink exists when needed
      ansible.builtin.file:
        src: /usr/bin/tigervncserver
        dest: /usr/bin/vncserver
        state: link
      when: ansible_facts.os_family == "Debian"

    - name: Ensure install directory exists
      ansible.builtin.file:
        path: '{{ aadm_install_dir }}'
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'

    - name: Ensure ai-agent-browser install directory exists
      ansible.builtin.file:
        path: '{{ aab_install_dir }}'
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'

    - name: Upload repository archive
      ansible.builtin.copy:
        src: '{{ aadm_repo_archive_local }}'
        dest: '{{ aadm_repo_archive_remote }}'
        mode: '0644'

    - name: Upload ai-agent-browser archive
      ansible.builtin.copy:
        src: '{{ aab_repo_archive_local }}'
        dest: '{{ aab_repo_archive_remote }}'
        mode: '0644'

    - name: Unpack repository archive
      ansible.builtin.unarchive:
        src: '{{ aadm_repo_archive_remote }}'
        dest: '{{ aadm_install_dir }}'
        remote_src: true
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        extra_opts:
          - --strip-components=1

    - name: Unpack ai-agent-browser archive
      ansible.builtin.unarchive:
        src: '{{ aab_repo_archive_remote }}'
        dest: '{{ aab_install_dir }}'
        remote_src: true
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        extra_opts:
          - --strip-components=1

    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} install'
        chdir: '{{ aadm_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Install ai-agent-browser npm dependencies
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} install'
        chdir: '{{ aab_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Build manager
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} run build'
        chdir: '{{ aadm_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Build ai-agent-browser
      ansible.builtin.command:
        cmd: '{{ aadm_npm_bin }} run build'
        chdir: '{{ aab_install_dir }}'
      become_user: '{{ aadm_service_user }}'

    - name: Install global aadm CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/aadm
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-desktop-manager/dist/cli/aadm.js "$@"

    - name: Install global aab-console CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/aab-console
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-desktop-manager/dist/cli/aab-console.js "$@"

    - name: Install global ai-agent-browser CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/ai-agent-browser
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-browser/dist/index.js "$@"

    - name: Install global aab CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/aab
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/usr/bin/env bash
          exec {{ aadm_node_bin }} /opt/ai-agent-browser/dist/index.js "$@"

    - name: Ensure nginx snippet directory exists
      ansible.builtin.file:
        path: '{{ aadm_nginx_snippet_dir }}'
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0755'

    - name: Validate TLS deployment inputs
      ansible.builtin.assert:
        that:
          - aadm_tls_domain | length > 0
          - aadm_tls_email | length > 0
        fail_msg: 'aadm_smoke requires aadm_tls_domain and aadm_tls_email when aadm_enable_https is true'
      when: aadm_enable_https | bool

    - name: Ensure novnc nginx site includes manager snippets
      ansible.builtin.blockinfile:
        path: /etc/nginx/sites-available/novnc
        marker: '# {mark} AADM DESKTOP ROUTES'
        insertbefore: '  # noVNC static \+ websocket proxy'
        block: |
          include /etc/nginx/conf.d/agent-desktops/*.conf;
      notify: Reload aadm nginx

    - name: Ensure novnc nginx site uses the Let's Encrypt certificate
      ansible.builtin.replace:
        path: /etc/nginx/sites-available/novnc
        regexp: '^\s*ssl_certificate\s+.*;'
        replace: '  ssl_certificate     {{ aadm_tls_cert_path }};'
      notify: Reload aadm nginx

    - name: Ensure novnc nginx site uses the Let's Encrypt private key
      ansible.builtin.replace:
        path: /etc/nginx/sites-available/novnc
        regexp: '^\s*ssl_certificate_key\s+.*;'
        replace: '  ssl_certificate_key {{ aadm_tls_key_path }};'
      notify: Reload aadm nginx

    # ---------------------------------------------------------------------------
    # ai-agent-bridge (optional — enabled when aadm_install_bridge is true)
    # ---------------------------------------------------------------------------

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      when: aadm_install_bridge | bool

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc
      when: aadm_install_bridge | bool

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "${VERSION_CODENAME}") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list
      when: aadm_install_bridge | bool

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        update_cache: true
        state: present
      when: aadm_install_bridge | bool

    - name: Ensure aadm user is in docker group
      ansible.builtin.user:
        name: '{{ aadm_service_user }}'
        groups: docker
        append: true
      when: aadm_install_bridge | bool

    - name: Ensure bridge install directory exists
      ansible.builtin.file:
        path: '{{ item }}'
        state: directory
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0750'
      loop:
        - '{{ aadm_bridge_install_dir }}'
        - '{{ aadm_bridge_install_dir }}/config'
        - '{{ aadm_bridge_cert_dir }}'
      when: aadm_install_bridge | bool

    - name: Render bridge configuration
      ansible.builtin.copy:
        dest: '{{ aadm_bridge_install_dir }}/config/bridge.yaml'
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0640'
        content: |
          server:
            listen: 0.0.0.0:9445
          tls:
            ca_bundle: /app/certs/ca-bundle.crt
            cert:     /app/certs/server.crt
            key:      /app/certs/server.key
          feature_flags:
            provider_fallbacks: false
          sessions:
            max_per_project: 5
            max_global: 20
            idle_timeout: 30m
          providers:
            - name: claude
              binary: node
              args: ["@anthropic-ai/claude-code", "--verbose"]
              startup_timeout: 60s
              prompt_pattern: "(?m)(❯|>\\s*$)"
              required_env: [ANTHROPIC_API_KEY]
          allowed_paths:
            - /app/data/workspaces
            - /tmp
          logging:
            format: json
            level: info
      when: aadm_install_bridge | bool

    - name: Render bridge environment file
      ansible.builtin.copy:
        dest: '{{ aadm_bridge_install_dir }}/.env'
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0640'
        content: |
          ANTHROPIC_API_KEY={{ aadm_anthropic_api_key }}
          OPENAI_API_KEY={{ aadm_openai_api_key }}
          GEMINI_API_KEY={{ aadm_gemini_api_key }}
      when: aadm_install_bridge | bool

    - name: Install bridge systemd service
      ansible.builtin.copy:
        src: '{{ aadm_install_dir }}/systemd/bridge.service'
        dest: /etc/systemd/system/bridge.service
        remote_src: true
        owner: root
        group: root
        mode: '0644'
      when: aadm_install_bridge | bool

    - name: Reload systemd for bridge unit
      ansible.builtin.systemd:
        daemon_reload: true
      when: aadm_install_bridge | bool

    - name: Pull ai-agent-bridge image
      community.docker.docker_image:
        name: '{{ aadm_bridge_image }}'
        source: pull
      become_user: '{{ aadm_service_user }}'
      when: aadm_install_bridge | bool

    - name: Enable and start bridge service
      ansible.builtin.systemd:
        name: bridge.service
        enabled: true
        state: started
      when: aadm_install_bridge | bool

    - name: Wait for bridge to generate certs and become healthy
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 9445
        timeout: 60
      when: aadm_install_bridge | bool

    - name: Set bridge address for AADM when bridge is installed locally
      ansible.builtin.set_fact:
        aadm_bridge_addr: '127.0.0.1:9445'
        aadm_bridge_ca_cert_path: '{{ aadm_bridge_cert_dir }}/ca-bundle.crt'
        aadm_bridge_client_cert_path: '{{ aadm_bridge_cert_dir }}/client.crt'
        aadm_bridge_client_key_path: '{{ aadm_bridge_cert_dir }}/client.key'
      when: aadm_install_bridge | bool

    - name: Set empty bridge cert paths when bridge is not installed
      ansible.builtin.set_fact:
        aadm_bridge_ca_cert_path: ''
        aadm_bridge_client_cert_path: ''
        aadm_bridge_client_key_path: ''
      when: not (aadm_install_bridge | bool)

    - name: Render manager environment
      ansible.builtin.copy:
        dest: '{{ aadm_install_dir }}/.env'
        owner: '{{ aadm_service_user }}'
        group: '{{ aadm_service_group }}'
        mode: '0640'
        content: |
          AADM_HOST=127.0.0.1
          AADM_PORT=8899
          AADM_AUTH_TOKEN={{ aadm_auth_token }}
            AADM_DESKTOP_ROUTE_AUTH_MODE=token
          AADM_DESKTOP_ROUTE_AUTH_REQUEST_URL=
          AADM_DESKTOP_ROUTE_AUTH_REQUEST_HEADERS=
          AADM_DESKTOP_ROUTE_TOKEN_SECRET={{ aadm_desktop_route_token_secret }}
          AADM_DESKTOP_ROUTE_TOKEN_TTL_SECONDS=900
          AADM_PUBLIC_BASE_URL={{ aadm_public_base_url }}
          AADM_NGINX_SNIPPET_DIR={{ aadm_nginx_snippet_dir }}
          AADM_STATE_DIR={{ aadm_state_dir }}
          AADM_WORKSPACE_ROOT_DIR={{ aadm_state_dir }}/workspaces
          AADM_DISPLAY_MIN=2
          AADM_DISPLAY_MAX=11
          AADM_WEBSOCKIFY_PORT_MIN=6081
          AADM_WEBSOCKIFY_PORT_MAX=6090
          AADM_CDP_PORT_MIN=9222
          AADM_CDP_PORT_MAX=9231
          AADM_AAB_PORT_MIN=8765
          AADM_AAB_PORT_MAX=8774
          AADM_BRIDGE_ADDR={{ aadm_bridge_addr }}
          AADM_BRIDGE_CA_CERT_PATH={{ aadm_bridge_ca_cert_path }}
          AADM_BRIDGE_CLIENT_CERT_PATH={{ aadm_bridge_client_cert_path }}
          AADM_BRIDGE_CLIENT_KEY_PATH={{ aadm_bridge_client_key_path }}
          AADM_NGINX_BIN=/usr/sbin/nginx
          AADM_SYSTEMCTL_BIN=/bin/systemctl
          AADM_UNIT_VNC=vnc@
          AADM_UNIT_WEBSOCKIFY=websockify@
          AADM_UNIT_CHROME=chrome@
          AADM_UNIT_AAB=aab@
          AADM_NOVNC_PATH_PREFIX=/desktop
      notify:
        - Restart aadm

    - name: Install sudoers allowlist
      ansible.builtin.copy:
        src: '{{ aadm_install_dir }}/ops/sudoers-aadm'
        dest: /etc/sudoers.d/aadm
        remote_src: true
        owner: root
        group: root
        mode: '0440'

    - name: Install systemd units
      ansible.builtin.copy:
        src: '{{ item }}'
        dest: '/etc/systemd/system/{{ item | basename }}'
        remote_src: true
        owner: root
        group: root
        mode: '0644'
      loop:
        - '{{ aadm_install_dir }}/systemd/aadm.service'
        - '{{ aadm_install_dir }}/systemd/vnc@.service'
        - '{{ aadm_install_dir }}/systemd/websockify@.service'
        - '{{ aadm_install_dir }}/systemd/chrome@.service'
        - '{{ aadm_install_dir }}/systemd/aab@.service'

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Flush handlers after nginx snippet include update
      ansible.builtin.meta: flush_handlers

    - name: Reset failed state for smoke-test units
      ansible.builtin.command:
        cmd: systemctl reset-failed aadm.service vnc@1 websockify@1 chrome@1 aab@1
      changed_when: false
      failed_when: false

    - name: Enable and start manager
      ansible.builtin.systemd:
        name: aadm.service
        enabled: true
        state: started

    - name: Wait for manager health endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:8899/health
        return_content: true
        status_code: 200
      register: aadm_health
      retries: 20
      delay: 3
      until: aadm_health.status == 200

    - name: List existing smoke desktops
      ansible.builtin.uri:
        url: http://127.0.0.1:8899/v1/desktops
        method: GET
        return_content: true
        status_code: 200
      register: aadm_existing_desktops
      when: aadm_smoke_create_desktop | bool

    - name: Destroy previous smoke-test desktops
      ansible.builtin.uri:
        url: 'http://127.0.0.1:8899/v1/desktops/{{ item.id }}'
        method: DELETE
        return_content: true
        status_code: 200
      loop: >-
        {{
          (aadm_existing_desktops.json.desktops | default([]))
          | selectattr('owner', 'equalto', 'smoke-test')
          | list
        }}
      loop_control:
        label: '{{ item.id }}'
      when: aadm_smoke_create_desktop | bool

    - name: Create smoke desktop
      ansible.builtin.uri:
        url: http://127.0.0.1:8899/v1/desktops
        method: POST
        body_format: json
        body:
          owner: smoke-test
          label: ubuntu-24-spot
          ttlMinutes: 120
          startUrl: https://example.com
          routeAuthMode: token
        return_content: true
        status_code: 200
      register: aadm_create
      when: aadm_smoke_create_desktop | bool

    - name: Wait for smoke desktop websockify port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: '{{ (6081 - 2) + (aadm_create.json.display | int) }}'
        timeout: 30
      when: aadm_smoke_create_desktop | bool

    - name: Wait for smoke desktop CDP port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: '{{ (9222 - 2) + (aadm_create.json.display | int) }}'
        timeout: 30
      when: aadm_smoke_create_desktop | bool

    - name: Wait for smoke desktop aab port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: '{{ (8765 - 2) + (aadm_create.json.display | int) }}'
        timeout: 30
      when: aadm_smoke_create_desktop | bool

    - name: Run doctor on smoke desktop
      ansible.builtin.uri:
        url: "http://127.0.0.1:8899/v1/desktops/{{ (aadm_create.json.id | default('desk-1')) }}/doctor"
        return_content: true
        status_code: 200
      register: aadm_doctor
      when: aadm_smoke_create_desktop | bool

    - name: Create smoke desktop access URL for token-protected routes
      ansible.builtin.uri:
        url: 'http://127.0.0.1:8899/v1/desktops/{{ aadm_create.json.id }}/access-url'
        method: POST
        body_format: json
        body: {}
        return_content: true
        status_code: 200
      register: aadm_access_url
      when: aadm_smoke_create_desktop | bool

    - name: Verify public noVNC route is reachable through nginx
      ansible.builtin.uri:
        url: >-
          {{
            aadm_access_url.json.accessUrl
          }}
        return_content: true
        follow_redirects: none
        status_code: 302
        validate_certs: true
      register: aadm_novnc
      when: aadm_smoke_create_desktop | bool

    - name: Destroy smoke desktop when requested
      ansible.builtin.uri:
        url: 'http://127.0.0.1:8899/v1/desktops/{{ aadm_create.json.id }}'
        method: DELETE
        return_content: true
        status_code: 200
      when:
        - aadm_smoke_create_desktop | bool
        - aadm_smoke_destroy_desktop | bool

    - name: Write smoke summary
      ansible.builtin.copy:
        dest: /tmp/aadm-smoke-summary.json
        mode: '0644'
        content: |
          {
            "health": {{ aadm_health.json | to_nice_json }},
            "create": {{ aadm_create.json | default({}) | to_nice_json }},
            "doctor": {{ aadm_doctor.json | default({}) | to_nice_json }},
            "accessUrl": {{ aadm_access_url.json.accessUrl | default(aadm_access_url.json.url | default('')) | to_json }},
            "novncBaseUrl": {{ ('https://' ~ aadm_tls_domain ~ '/') | to_json }},
            "novnc_status": {{ aadm_novnc.status | default(0) }},
            "novnc_redirect_location": {{ aadm_novnc.location | default('') | to_json }},
            "vnc_auth": "novnc_openbox_vnc_password",
            "vnc_password": {{ aadm_vnc_password | to_json }}
          }

    - name: Show aadm CLI usage
      ansible.builtin.debug:
        msg:
          - 'Use the global aadm CLI on the host:'
          - '  aadm create --owner smoke --label first --ttl 60 --start-url https://example.com'
          - '  aadm create --owner smoke --label protected --route-auth-mode token'
          - '  aadm access-url --id desk-1'
          - '  aadm terminal-access --id desk-1'
          - '  aadm list'
          - '  aadm doctor --id desk-1'
          - '  aadm destroy --id desk-1'
          - 'Follow browser console events:'
          - '  aab-console follow'
          - 'Run JS and keep following:'
          - "  aab-console eval 'console.log(window.location.href)' --follow"
          - 'Capture a screenshot:'
          - '  aab-console screenshot --out shot.png'
          - 'ai-agent-browser is also available globally:'
          - '  ai-agent-browser --host 127.0.0.1 --port 8765 --cdp-host 127.0.0.1 --cdp-port 9222'
          - '  aab --host 127.0.0.1 --port 8765 --cdp-host 127.0.0.1 --cdp-port 9222'

  handlers:
    - name: Reload aadm nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
    - name: Restart aadm
      ansible.builtin.systemd:
        name: aadm.service
        state: restarted
