syntax = "proto3";

package bridge.v1;

option go_package = "github.com/markcallen/ai-agent-bridge/gen/bridge/v1;bridgev1";

import "google/protobuf/timestamp.proto";

service BridgeService {
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc AttachSession(AttachSessionRequest) returns (stream AttachSessionEvent);
  rpc WriteInput(WriteInputRequest) returns (WriteInputResponse);
  rpc ResizeSession(ResizeSessionRequest) returns (ResizeSessionResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_STARTING = 1;
  SESSION_STATUS_RUNNING = 2;
  SESSION_STATUS_ATTACHED = 3;
  SESSION_STATUS_STOPPING = 4;
  SESSION_STATUS_STOPPED = 5;
  SESSION_STATUS_FAILED = 6;
}

enum AttachEventType {
  ATTACH_EVENT_TYPE_UNSPECIFIED = 0;
  ATTACH_EVENT_TYPE_ATTACHED = 1;
  ATTACH_EVENT_TYPE_OUTPUT = 2;
  ATTACH_EVENT_TYPE_REPLAY_GAP = 3;
  ATTACH_EVENT_TYPE_SESSION_EXIT = 4;
  ATTACH_EVENT_TYPE_ERROR = 5;
  ATTACH_EVENT_TYPE_THINKING = 6;
}

message StartSessionRequest {
  string project_id = 1;
  string session_id = 2;
  string repo_path = 3;
  string provider = 4;
  map<string, string> agent_opts = 5;
  uint32 initial_cols = 6;
  uint32 initial_rows = 7;
}

message StartSessionResponse {
  string session_id = 1;
  SessionStatus status = 2;
  google.protobuf.Timestamp created_at = 3;
}

message StopSessionRequest {
  string session_id = 1;
  bool force = 2;
}

message StopSessionResponse {
  SessionStatus status = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  string session_id = 1;
  string project_id = 2;
  string provider = 3;
  SessionStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp stopped_at = 6;
  string error = 7;
  bool attached = 8;
  string attached_client_id = 9;
  bool exit_recorded = 10;
  int32 exit_code = 11;
  uint64 oldest_seq = 12;
  uint64 last_seq = 13;
  uint32 cols = 14;
  uint32 rows = 15;
}

message ListSessionsRequest {
  string project_id = 1;
}

message ListSessionsResponse {
  repeated GetSessionResponse sessions = 1;
}

message AttachSessionRequest {
  string session_id = 1;
  uint64 after_seq = 2;
  string client_id = 3;
}

message AttachSessionEvent {
  AttachEventType type = 1;
  uint64 seq = 2;
  google.protobuf.Timestamp timestamp = 3;
  string session_id = 4;
  bytes payload = 5;
  bool replay = 6;
  uint64 oldest_seq = 7;
  uint64 last_seq = 8;
  bool exit_recorded = 9;
  int32 exit_code = 10;
  string error = 11;
  uint32 cols = 12;
  uint32 rows = 13;
  string thinking_text = 14;
}

message WriteInputRequest {
  string session_id = 1;
  string client_id = 2;
  bytes data = 3;
}

message WriteInputResponse {
  bool accepted = 1;
  uint32 bytes_written = 2;
}

message ResizeSessionRequest {
  string session_id = 1;
  string client_id = 2;
  uint32 cols = 3;
  uint32 rows = 4;
}

message ResizeSessionResponse {
  bool applied = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  repeated ProviderHealth providers = 2;
  string server_instance_id = 3;
}

message ProviderHealth {
  string provider = 1;
  bool available = 2;
  string error = 3;
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated ProviderInfo providers = 1;
}

message ProviderInfo {
  string provider = 1;
  bool available = 2;
  string binary = 3;
  string version = 4;
}
